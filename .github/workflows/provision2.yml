name: Provision Student Repository

on:
  issues:
    types: [opened]
  
# Don't need this anymore since we're not updating the txt file, just reading it
# concurrency:
#   group: enrollment-queue
#   cancel-in-progress: false # Forces GitHub to queue them sequentially to handle multiple students

jobs:
  create-repo:
    if: contains(github.event.issue.labels.*.name, 'provision-repo2')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Enrollment Repository
        uses: actions/checkout@v5

      - name: Universal Classroom Provisioning Engine
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: "---BEGIN_KEY---\n${{ secrets.APP_PRIVATE_KEY }}\n---END_KEY---"
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ================================================================
          # 1. HELPER FUNCTION: GENERATE ON-DEMAND LIVE APP TOKENS
          # ================================================================
          get_live_token() {
            # Clean and reassemble multi-line structural RSA private key
            CLEAN_KEY=$(echo "${{ secrets.APP_PRIVATE_KEY }}" | sed 's/\\n/\n/g')
            
            # Extract the organization name parameter early for token routing
            LOCAL_ORG=$(grep "# ORG_NAME:" pg2Info.txt | head -n1 | sed 's/# ORG_NAME: //g' | tr -d '[:space:]')
            
            # Build cryptographic header and payload metadata for the JWT
            JWT_HDR=$(echo -n '{"alg":"RS256","typ":"JWT"}' | openssl base64 -e -A | tr -d '=' | tr '/+' '_-')
            JWT_PAY=$(echo -n "{\"iat\":$(($(date +%s)-60)),\"exp\":$(($(date +%s)+600)),\"iss\":\"$APP_ID\"}" | openssl base64 -e -A | tr -d '=' | tr '/+' '_-')
            JWT_SIG=$(echo -n "$JWT_HDR.$JWT_PAY" | openssl dgst -sha256 -sign <(echo "$CLEAN_KEY") | openssl base64 -e -A | tr -d '=' | tr '/+' '_-')
            JWT="$JWT_HDR.$JWT_PAY.$JWT_SIG"
            
            # Explicitly target the Organization-level Installation ID
            INST_ID=$(curl -s -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "https://github.com" | jq -r '.id')
            
            # Generate the live installation token payload string with full Org scope
            curl -s -X POST -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "https://github.com" | jq -r '.token'
          }

          # ================================================================
          # 2. PARSE ROSTER PARAMETERS & SECURITY SAFEGUARDS
          # ================================================================
          EXPECTED_HASH=$(grep "# MONTHLY_CODE:" pg2Info.txt | head -n1 | sed 's/# MONTHLY_CODE: //g' | tr -d '[:space:]')
          MAX_LIMIT=$(grep "# MAX_REPOS:" pg2Info.txt | head -n1 | sed 's/# MAX_REPOS: //g' | tr -d '[:space:]')
          REPO_PREFIX=$(grep "# PREFIX:" pg2Info.txt | head -n1 | sed 's/# PREFIX: //g' | tr -d '[:space:]')
          TEMPLATE_NAME=$(grep "# TEMPLATE:" pg2Info.txt | head -n1 | sed 's/# TEMPLATE: //g' | tr -d '[:space:]')
          ORG_NAME=$(grep "# ORG_NAME:" pg2Info.txt | head -n1 | sed 's/# ORG_NAME: //g' | tr -d '[:space:]')
          
          # Calculate the target expected cryptographic hash
          # EXPECTED_HASH=$(echo -n "$EXPECTED_CODE" | sha256sum | awk '{print $1}')

          # 2. Parse the code the student entered into the issue form field
          STUDENT_CODE=$(echo "$ISSUE_BODY" | sed -n '/### Claim Code/{n;p;}' | tr -d '[:space:]')
          if [ -z "$STUDENT_CODE" ] || [ "$STUDENT_CODE" = "_No_response_" ]; then
            STUDENT_CODE=$(echo "$ISSUE_BODY" | sed -n '/### Claim Code/{n;n;p;}' | tr -d '[:space:]')
          fi
          STUDENT_HASH=$(echo -n "$STUDENT_CODE" | sha256sum | awk '{print $1}')
          
          # Create an obfuscated version of the issue body, removing the claim code
          REDACTED_BODY=$(echo "$ISSUE_BODY" | sed "s/$STUDENT_CODE/[used claim code]/g")
          
          # overwrite the public text record to protect claim code
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$REDACTED_BODY"       

          # Validate monthly passcode entry match
          if [ "$STUDENT_HASH" != "$EXPECTED_HASH" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "❌ **Repository Creation Failed:** The monthly claim code you entered is incorrect. Please verify the code from the course module and try opening a new issue."
            gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason "not_planned"
            echo "::error::Invalid monthly class claim code submitted."
            echo $STUDENT_HASH
            echo $EXPECTED_HASH
            exit 1
          fi

          # Request fresh token block to run capacity registry checks
          MINTED_TOKEN=$(get_live_token)

          # Verify class seat limits
          # This pulls up to 1000 repos from the Org and uses grep to count names starting with the repo prefix
          CURRENT_COUNT=$(GH_TOKEN="$MINTED_TOKEN" gh repo list "$ORG_NAME" --source --limit 1000 --json name --jq '.[].name' | grep "^$REPO_PREFIX" | wc -l | tr -d '[:space:]')
          if [ -z "$CURRENT_COUNT" ]; then CURRENT_COUNT=0; fi
          echo "Active slots claimed: $CURRENT_COUNT / $MAX_LIMIT"
          
          echo "Active repositories using prefix '$REPO_PREFIX' in '$ORG_NAME': $CURRENT_COUNT / $MAX_LIMIT"
          if [ "$CURRENT_COUNT" -ge "$MAX_LIMIT" ]; then
            echo "::error::Class capacity seat registration limit reached."
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "🛑 **Workspace Capacity Limit Reached:** All available student workspaces for this active assignment cycle have already been claimed. Please contact your instructor or TA directly to request a seat override allocation."
            gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason "not_planned"
            exit 1
          fi

          # Form individual tracking usernames
          STUDENT_USER="${{ github.event.issue.user.login }}"
          NEW_REPO_NAME="${REPO_PREFIX}${STUDENT_USER}"

          if GH_TOKEN="$MINTED_TOKEN" gh repo view "$ORG_NAME/$NEW_REPO_NAME" >/dev/null 2>&1; then
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "⚠️ @$STUDENT_USER You have already requested an assignment repository for this project. Your active private workspace is located here: **https://github.com/${ORG}/${NEW_REPO_NAME}**"
            gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason "completed"
            exit 0
          fi

          # ================================================================
          # 3. WORKSPACE PROVISIONING & FILE TREE REPLICATION
          # ================================================================
          echo "Creating private repository: $NEW_REPO_NAME..."
          GH_TOKEN="$MINTED_TOKEN" gh repo create "$ORG_NAME/$NEW_REPO_NAME" --private
          sleep 5

          # REQUEST A NEW FRESH TOKEN NOW THAT THE REPOSITORY ACTUALLY EXISTS IN THE INFRASTRUCTURE!
          # This pulls a fresh scope token matching your updated organization catalog topology
          MINTED_TOKEN=$(get_live_token)

          echo "Inviting student user account '$STUDENT_USER' to workspace..."
          curl -s -X PUT -H "Authorization: token $MINTED_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://github.com" -d '{"permission":"write"}'

          echo "Cloning structural starter files from template..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git clone "https://x-access-token:${MINTED_TOKEN}@://github.com{ORG_NAME}/${TEMPLATE_NAME}.git"
          cd "$TEMPLATE_NAME"
          
          # Detach origin pointer and sync to newly instantiated student path
          git remote set-url origin "https://x-access-token:${MINTED_TOKEN}@://github.com{ORG_NAME}/${NEW_REPO_NAME}.git"
          
          DEFAULT_BRANCH=$(git branch --show-current)
          git push -u origin "$DEFAULT_BRANCH"

          # ================================================================
          # 4. FEEDBACK CHANNELS & INITIAL CLEANUP CLOSURES
          # ================================================================
          echo "Setting up grading pull request channels..."
          git checkout -b feedback
          git commit --allow-empty -m "Initialize assignment feedback environment"
          git push origin feedback

          GH_TOKEN="$MINTED_TOKEN" gh pr create \
            --repo "${ORG_NAME}/${NEW_REPO_NAME}" \
            --title "Grading & Feedback" \
            --body "This Pull Request tracks your assignment progress. Instructors will leave reviews here. Do not close or merge." \
            --base "feedback" \
            --head "$DEFAULT_BRANCH"

          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "@$STUDENT_USER Private repository successfully configured at **https://github.com/${ORG}/${NEW_REPO_NAME}**!"
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason "completed"
