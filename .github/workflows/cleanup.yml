name: Nightly Janitor Cleanup

on:
  schedule:
    # Runs automatically every night at midnight UTC (8:00 PM EST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to click a button to run it manually whenever you want

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Completed Enrollment Issues
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "Fetching completed enrollment issues for $GH_REPO..."
          
          # Gather up the unique IDs of all open or un-locked closed issues
          CLOSED_ISSUES=$(gh issue list --state all --label "provision-repo" --json number --jq '.[].number' 2>/dev/null || true)
          
          if [ -z "$CLOSED_ISSUES" ]; then
            echo "No matching assignment enrollment issues found to lock."
          else
            for num in $CLOSED_ISSUES; do
              echo "Closing and permanently locking issue #$num to protect privacy..."
              # Ensure the issue is closed
              gh issue close "$num" --repo "$GH_REPO" --reason "completed" || true
              # Lock the issue so it cannot be viewed or interacted with by outsiders
              gh issue lock "$num" --repo "$GH_REPO" --reason "resolved" || true
            done
          fi

      - name: Purge Completed Workflow Run Logs
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "Fetching historical workflow runs for $GH_REPO..."
          
          # Gather up to 100 historical completed runs from our dashboard
          RUN_IDS=$(gh run list --limit 100 --json databaseId --jq '.[].databaseId' 2>/dev/null || true)
          
          # Get the ID of the CURRENT running cleanup job so it doesn't try to delete itself while running
          CURRENT_RUN_ID="${{ github.run_id }}"
          
          if [ -z "$RUN_IDS" ]; then
            echo "No historical workflow runs found to clear."
          else
            # Mass delete the historical tracking logs
            for run_id in $RUN_IDS; do
              if [ "$run_id" != "$CURRENT_RUN_ID" ]; then
                echo "Permanently deleting workflow run log ID: $run_id..."
                gh run delete "$run_id" || true
              fi
            done
          fi
